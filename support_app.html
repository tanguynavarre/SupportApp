<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ExpertOps — Field App</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1f2937;font-size:14px}

/* HEADER */
header{background:#1e293b;padding:10px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.brand{color:white;font-size:15px;font-weight:800;letter-spacing:-.3px}
.brand span{color:#60a5fa}
.brand small{opacity:.5;font-weight:400;font-size:11px}
.mode-bar{display:flex;gap:6px;justify-content:center}
.mode-btn{padding:5px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.7);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.mode-btn.active{background:white;color:#1e293b;border-color:white}
.hdr-controls{display:flex;gap:6px;align-items:center;justify-content:flex-end}
select,input[type=text]{padding:5px 9px;font-size:12px;border-radius:6px;border:1px solid #475569;background:#334155;color:white;height:30px}
select option{background:#1e293b}
.btn-ghost{padding:5px 10px;border-radius:6px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:white;font-size:12px;font-weight:600;cursor:pointer;height:30px}
.btn-ghost:hover{background:rgba(255,255,255,.15)}
.hidden{display:none!important}

/* MODE BANNER */
.mode-banner{padding:6px 16px;font-size:11px;font-weight:600;text-align:center}
.mode-banner.maint{background:#1e3a5f;color:#93c5fd}
.mode-banner.ls{background:#14532d;color:#86efac}

/* MAIN */
main{max-width:720px;margin:0 auto;padding:14px 16px}

/* SW GATE */
.sw-gate{background:#1e293b;border-radius:10px;padding:11px 14px;margin-bottom:14px;border:1.5px solid #334155}
.sw-gate-title{font-size:10px;font-weight:700;color:#93c5fd;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.sw-gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.sw-gate-link{font-size:11px;font-weight:600;color:#93c5fd;text-decoration:none;background:#334155;border:1px solid #475569;border-radius:4px;padding:4px 7px;display:block}
.sw-gate-link:hover{background:#475569}
.sw-gate-confirm{display:flex;gap:6px}
.sw-gate-btn{flex:1;padding:6px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.sw-gate-btn.ok{background:#dcfce7;color:#166534}
.sw-gate-btn.issue{background:#fee2e2;color:#991b1b}

/* PROGRESS */
.progress-bar{background:#e2e8f0;border-radius:4px;height:4px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:4px;background:#1b3a6b;border-radius:4px;transition:width .3s}

/* LIST */
.list-intro{font-size:12px;color:#64748b;margin-bottom:10px}
#symptomList{list-style:none}
#symptomList li{background:white;border-radius:8px;padding:10px 13px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:9px;border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,.04)}
#symptomList li:hover{background:#f8fafc;border-color:#1b3a6b}
.sym-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sym-dot.HIGH{background:#dc2626}.sym-dot.MEDIUM{background:#d97706}.sym-dot.LOW{background:#16a34a}
.sym-text{flex:1;font-weight:500;font-size:13px}
.sym-count{background:#e2e8f0;color:#475569;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* PAGE HEADER */
.page-title{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:4px}
.page-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px}
.tag-machine{background:#dbeafe;color:#1e40af}
.tag-risk-HIGH{background:#fee2e2;color:#991b1b}
.tag-risk-MEDIUM{background:#fef3c7;color:#92400e}

/* STAGE LABEL */
.stage-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin:14px 0 4px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:5px 8px;border-radius:6px;background:#f8fafc;border:1px solid #e2e8f0;transition:background .15s}
.stage-label:hover{background:#f1f5f9}
.stage-label::after{content:'';flex:1;height:1px;background:#e2e8f0}
.stage-label .stage-arrow{font-size:10px;color:#94a3b8;margin-left:auto;transition:transform .2s;flex-shrink:0}
.stage-label.collapsed .stage-arrow{transform:rotate(-90deg)}
.stage-label.collapsed{opacity:.7}
.stage-body{overflow:hidden;transition:max-height .25s ease}
.stage-body.collapsed{max-height:0!important;overflow:hidden}

/* DECISION CARD — core element */
.dc{border-radius:9px;margin-bottom:8px;overflow:hidden;border:1px solid #e2e8f0;background:white}

/* Role variants */
.dc.field{border-left:4px solid #0F6E56;background:#f0fdf4}
.dc.remote-only{border-left:4px solid #185FA5;background:#f0f6ff}
.dc.ls-escalate{border-left:4px solid #7c3aed;background:#faf5ff;border-style:dashed}
.dc.both{border-left:4px solid #185FA5}

.dc-hdr{padding:10px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.dc-hdr:hover{background:rgba(0,0,0,.03)}
.dc-num{width:22px;height:22px;border-radius:50%;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dc.field .dc-num{background:#0F6E56}
.dc.remote-only .dc-num{background:#185FA5}
.dc.ls-escalate .dc-num{background:#7c3aed}
.dc.both .dc-num{background:#185FA5}
.dc-hdr-body{flex:1;min-width:0}
.dc-role{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.dc.field .dc-role{color:#0F6E56}
.dc.remote-only .dc-role{color:#185FA5}
.dc.ls-escalate .dc-role{color:#7c3aed}
.dc.both .dc-role{color:#185FA5}
.dc-title{font-size:13px;font-weight:600;color:#1f2937;line-height:1.3}
.dc-cat{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:#e2e8f0;color:#475569;flex-shrink:0}
.dc-chevron{font-size:10px;color:#94a3b8;flex-shrink:0;transition:transform .15s}
.dc.open .dc-chevron{transform:rotate(180deg)}
.dc-status{font-size:15px;flex-shrink:0}

.dc-body{padding:0 13px 12px 44px;display:none}
.dc.open .dc-body{display:block}

.dc-action{font-size:12px;color:#1f2937;line-height:1.6;margin-bottom:6px;background:#f8fafc;border-radius:5px;padding:7px 9px;border:1px solid #e2e8f0}
.dc.field .dc-action{background:white;border-color:#a7f3d0;color:#064e3b}
.dc.remote-only .dc-action{background:white;border-color:#bfdbfe;color:#1e3a5f}
.dc.ls-escalate .dc-action{background:white;border-color:#e9d5ff;color:#4c1d95}

.dc-sup-action{font-size:12px;color:#1e3a5f;line-height:1.6;margin-bottom:6px;background:#eff6ff;border-radius:5px;padding:7px 9px;border:1px solid #bfdbfe}
.dc-sup-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#185FA5;margin-bottom:3px}
.dc-fld-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#0F6E56;margin-bottom:3px}
.dc-fld-action{font-size:12px;color:#064e3b;line-height:1.6;margin-bottom:6px;background:#f0fdf4;border-radius:5px;padding:7px 9px;border:1px solid #a7f3d0}

.dc-note{font-size:11px;color:#64748b;font-style:italic;margin-bottom:6px;line-height:1.4;border-left:2px solid #e2e8f0;padding-left:7px}
.dc-parts{font-size:10px;background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:6px}
.dc-links{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.dc-link{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid #bfdbfe;background:white;color:#185FA5;text-decoration:none;cursor:pointer;font-weight:500}
.dc-link.green{border-color:#a7f3d0;color:#0F6E56}
.dc-link:hover{background:#dbeafe}

/* LS ESCALATE BUTTON (maintenance mode) */
.ls-esc-btn{width:100%;padding:8px;border-radius:7px;border:1.5px dashed #7c3aed;background:#faf5ff;color:#7c3aed;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:6px}
.ls-esc-btn:hover{background:#ede9fe}
.ls-esc-panel{background:#faf5ff;border:1.5px solid #e9d5ff;border-radius:7px;padding:9px 11px;margin-bottom:6px;display:none}
.ls-esc-panel.open{display:block}
.ls-esc-panel-title{font-size:9px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.ls-esc-action{font-size:12px;color:#4c1d95;line-height:1.5;margin-bottom:5px}

/* PROGRESS BUTTONS */
.dc-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.dc-btn{flex:1;padding:7px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;min-width:110px}
.dc-btn-ok{background:#dcfce7;color:#166534;border:1.5px solid #86efac}
.dc-btn-ok:hover{background:#bbf7d0}
.dc-btn-skip{background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0}
.dc-btn-skip:hover{background:#e2e8f0}
.dc-btn-ls{background:#faf5ff;color:#7c3aed;border:1.5px solid #e9d5ff}
.dc-btn-ls:hover{background:#ede9fe}

.dc.done-ok{border-color:#86efac!important;background:#f0fdf4!important}
.dc.done-ok .dc-num{background:#16a34a}
.dc.done-skip{border-color:#e2e8f0!important;background:#f8fafc!important;opacity:.7}

/* COMPLETE */
.complete-panel{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px;text-align:center;margin-top:14px}
.complete-panel h3{color:#166534;font-size:14px;margin-bottom:4px}
.complete-panel p{font-size:12px;color:#16a34a;margin-bottom:10px}
.rovo-box{background:white;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px;margin-top:8px;text-align:left}
.rovo-title{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.rovo-text{font-size:11px;color:#1f2937;line-height:1.6;white-space:pre-wrap}
.copy-btn{padding:5px 12px;font-size:11px;font-weight:600;border-radius:5px;border:1.5px solid #1b3a6b;background:white;color:#1b3a6b;cursor:pointer;margin-top:6px;float:right}
.copy-btn:hover{background:#1b3a6b;color:white}
.copy-btn.copied{background:#16a34a;color:white;border-color:#16a34a}
</style>
</head>

rows=EMBEDDED_DATA;
[...new Set(rows.map(r=>r.Machine).filter(Boolean))].sort().forEach(m=>{
  const o=document.createElement('option');o.value=m;o.textContent=m;machineSel.appendChild(o);
});
renderList();

function active(){const m=machineSel.value;return m?rows.filter(r=>r.Machine===m):rows;}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function badge(t,c){const b=el('span','tag '+c);b.textContent=t;return b;}
function stageOf(cat){for(const s of FUNNEL){if(s.toLowerCase()===cat.toLowerCase()||cat.toLowerCase().includes(s.toLowerCase()))return s;}return 'Other';}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  modeBanner.className='mode-banner '+(m==='maint'?'maint':'ls');
  modeBanner.textContent=m==='maint'?'🔧 Maintenance — field steps only. Remote steps show as LS escalation buttons.':'🛰 Live Support — all steps visible. Blue = remote · Green = field.';
  if(currentObs)openSymptom(currentObs);
  else renderList(searchInput.value);
}

machineSel.addEventListener('change',()=>renderList(searchInput.value));
searchInput.oninput=e=>renderList(e.target.value);
backBtn.onclick=()=>{currentObs=null;stepResults={};renderList(searchInput.value);};

function renderSWGate(){
  const old=document.getElementById('swGate');if(old)old.remove();
  const m=machineSel.value;if(!m)return;
  const gate=el('div','');gate.id='swGate';gate.className='sw-gate';
  const isNext=IS_NEXT(m);
  const layoutLink=IS_V4(m)?CFG.layout_v4:CFG.layout_next;
  gate.innerHTML=`<div class="sw-gate-title">🔒 Pre-check — confirm with LS/Support before starting</div>
    <div class="sw-gate-grid">
      <a class="sw-gate-link" href="${CFG.sw_master}" target="_blank">📦 Software master version</a>
      <a class="sw-gate-link" href="${CFG.config}" target="_blank">⚙️ Config per client</a>
      <a class="sw-gate-link" href="${layoutLink}" target="_blank">🗺 Door mapping & layouts</a>
      <a class="sw-gate-link" href="${CFG.kerong}" target="_blank">🔑 Kerong compatibility</a>
      <a class="sw-gate-link" href="${CFG.kerong_cfg}" target="_blank">🧰 Kerong configurator</a>
      ${isNext?'<a class="sw-gate-link" href="'+CFG.rj45+'" target="_blank">🔌 RJ45 + Kerong numbers</a>':''}
      ${isNext?'<a class="sw-gate-link" href="'+CFG.battery+'" target="_blank">🔋 Battery installation</a>':''}
    </div>
    <div style="font-size:10px;color:#93c5fd;margin-top:5px">Confirm: ✓ FW correct &nbsp;✓ BO config applied &nbsp;✓ Layout matches physical &nbsp;✓ Door mapping correct</div>`;
  document.querySelector('main').insertBefore(gate,document.querySelector('main').firstChild);
}

function renderList(filter=''){
  symptomList.innerHTML='';resultDiv.innerHTML='';
  symptomList.classList.remove('hidden');backBtn.classList.add('hidden');
  listIntro.classList.remove('hidden');progressBar.classList.add('hidden');
  currentObs=null;stepResults={};renderSWGate();
  const seen=new Map();
  active().forEach(r=>{
    const obs=r['Observable Symptom'];
    if(!obs||obs==='MISSING'||obs.includes('pre-check')||obs.includes('SW / FW'))return;
    if(!seen.has(obs))seen.set(obs,{count:0,risk:'LOW'});
    const s=seen.get(obs);s.count++;
    if(r['Diagnosis Risk']==='HIGH')s.risk='HIGH';
    else if(r['Diagnosis Risk']==='MEDIUM'&&s.risk!=='HIGH')s.risk='MEDIUM';
  });
  [...seen.entries()].filter(([obs])=>obs.toLowerCase().includes((filter||'').toLowerCase()))
    .forEach(([obs,{count,risk}])=>{
      const li=document.createElement('li');
      const dot=el('span','sym-dot '+risk);li.appendChild(dot);
      const txt=el('span','sym-text');txt.textContent=obs;li.appendChild(txt);
      const cnt=el('span','sym-count');cnt.textContent=count;li.appendChild(cnt);
      li.onclick=()=>openSymptom(obs);
      symptomList.appendChild(li);
    });
}

function openSymptom(obs){
  currentObs=obs;stepResults={};
  symptomList.classList.add('hidden');backBtn.classList.remove('hidden');
  listIntro.classList.add('hidden');resultDiv.innerHTML='';

  const data=active().filter(r=>r['Observable Symptom']===obs);
  if(!data.length)return;
  const machine=machineSel.value;

  // Title
  const hdr=el('div','');
  hdr.innerHTML=`<div class="page-title">${obs}</div>`;
  const meta=el('div','page-meta');
  if(machine)meta.appendChild(badge(machine,'tag-machine'));
  const maxRisk=data.reduce((a,r)=>r['Diagnosis Risk']==='HIGH'?'HIGH':a==='HIGH'?'HIGH':r['Diagnosis Risk']==='MEDIUM'?'MEDIUM':a,'LOW');
  if(maxRisk!=='LOW')meta.appendChild(badge(maxRisk+' diagnosis risk','tag-risk-'+maxRisk));
  hdr.appendChild(meta);resultDiv.appendChild(hdr);

  // Separate remote vs field rows
  const remoteRows=data.filter(r=>r['Actions for support']&&!['MISSING','/',''].includes(r['Actions for support']));
  const fieldRowsRaw=data.filter(r=>r['Observability Level']!=='Remote'&&r['Actions for field']&&!['MISSING','/',''].includes(r['Actions for field']));

  // Field rows: NO dedup — each row is now one step (keyed by Symptom ID)
  // Sort by Symptom ID so steps appear in order (F1, F2, F3...)
  const fieldRows=fieldRowsRaw.slice().sort((a,b)=>{
    const sa=String(a['Symptom ID']||''), sb=String(b['Symptom ID']||'');
    return sa.localeCompare(sb, undefined, {numeric:true});
  });

  // Remote rows: dedupe by sub-issue, prefer numbered/longer action
  const seenRemote=new Map();
  remoteRows.forEach(r=>{
    const key=r['Sub-Issue (Observable / Physical)'];
    const act=r['Actions for support'];
    if(!seenRemote.has(key)){seenRemote.set(key,r);}
    else{const isNum=/^\d+[_\. ]/.test(act);if(isNum||act.length>seenRemote.get(key)['Actions for support'].length+20)seenRemote.set(key,r);}
  });
  const remoteUniq=[...seenRemote.values()];

  // Group field rows by stage
  const fieldStages=new Map();
  fieldRows.forEach(r=>{
    const s=stageOf(r.Category||'');
    if(!fieldStages.has(s))fieldStages.set(s,[]);
    fieldStages.get(s).push(r);
  });
  const fieldSorted=[...fieldStages.entries()].sort((a,b)=>{
    const ai=FUNNEL.indexOf(a[0]),bi=FUNNEL.indexOf(b[0]);
    return(ai===-1?99:ai)-(bi===-1?99:bi);
  });

  if(mode==='maint'){
    // MAINTENANCE MODE: field steps + LS escalation cards for remote actions
    let totalSteps=fieldRows.length;
    // Expand/collapse all
    const toggleBar=el('div','');
    toggleBar.style.cssText='display:flex;gap:8px;margin:8px 0 4px;justify-content:flex-end';
    const btnAll=el('button','');
    btnAll.style.cssText='font-size:10px;color:#64748b;background:none;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;cursor:pointer';
    btnAll.textContent='Collapse all';
    let allCollapsed=false;
    btnAll.onclick=()=>{
      allCollapsed=!allCollapsed;
      resultDiv.querySelectorAll('.stage-body').forEach(b=>{
        b.classList.toggle('collapsed',allCollapsed);
        if(!allCollapsed)b.style.maxHeight=b.scrollHeight+50+'px';
      });
      resultDiv.querySelectorAll('.stage-label').forEach(l=>{l.classList.toggle('collapsed',allCollapsed);});
      btnAll.textContent=allCollapsed?'Expand all':'Collapse all';
    };
    resultDiv.appendChild(toggleBar);
    let lastStage='';let currentBody=null;

    fieldSorted.forEach(([stage,stageRows])=>{
      if(stage!==lastStage){
        const lbl=el('div','stage-label');
        const icon=STAGE_ICONS[stage]||'🔍';
        lbl.innerHTML=`<span>${icon} ${stage}</span><span style="font-size:9px;color:#94a3b8;font-weight:400;margin-left:4px">(${stageRows.length})</span><span class="stage-arrow">▼</span>`;
        const body=el('div','stage-body');
        body.style.maxHeight='2000px';
        lbl.onclick=()=>{const col=body.classList.toggle('collapsed');lbl.classList.toggle('collapsed',col);if(!col)body.style.maxHeight=body.scrollHeight+50+'px';};
        resultDiv.appendChild(lbl);
        resultDiv.appendChild(body);
        currentBody=body;
        lastStage=stage;
      }
      stageRows.forEach((r,i)=>{
        const idx=fieldRows.indexOf(r)+1;
        renderFieldCard(r,idx,obs,fieldRows,remoteUniq,totalSteps,currentBody);
      });
    });

    // LS escalation section for remote-only checks
    if(remoteUniq.length){
      const lbl=el('div','stage-label');
      lbl.innerHTML=`<span>🛰 Escalate to Live Support for these</span><span style="font-size:9px;color:#94a3b8;font-weight:400;margin-left:4px">(${remoteUniq.length})</span><span class="stage-arrow">▼</span>`;
      const lsBody=el('div','stage-body');lsBody.style.maxHeight='2000px';
      lbl.onclick=()=>{const col=lsBody.classList.toggle('collapsed');lbl.classList.toggle('collapsed',col);if(!col)lsBody.style.maxHeight=lsBody.scrollHeight+50+'px';};
      resultDiv.appendChild(lbl);resultDiv.appendChild(lsBody);
      remoteUniq.forEach((r,i)=>{
        renderLSCard(r,i+1,obs,lsBody);
      });
    }
  } else {
    // LIVE SUPPORT MODE: all steps, role colour-coded
    // First remote checks, then field steps
    if(remoteUniq.length){
      const remoteStages=new Map();
      remoteUniq.forEach(r=>{
        const s=stageOf(r.Category||'');
        if(!remoteStages.has(s))remoteStages.set(s,[]);
        remoteStages.get(s).push(r);
      });
      const remoteSorted=[...remoteStages.entries()].sort((a,b)=>{
        const ai=FUNNEL.indexOf(a[0]),bi=FUNNEL.indexOf(b[0]);
        return(ai===-1?99:ai)-(bi===-1?99:bi);
      });
      let lastStage='';
      let idx=1;
      remoteSorted.forEach(([stage,stageRows])=>{
        if(stage!==lastStage){
          const lbl=el('div','stage-label');lbl.textContent=(STAGE_ICONS[stage]||'🔍')+' '+stage;
          resultDiv.appendChild(lbl);lastStage=stage;
        }
        stageRows.forEach(r=>{renderLSRemoteCard(r,idx++,obs);});
      });
    }

    if(fieldSorted.length){
      let lastStage='';
      fieldSorted.forEach(([stage,stageRows])=>{
        if(stage!==lastStage){
          const lbl=el('div','stage-label');lbl.textContent=(STAGE_ICONS[stage]||'🔍')+' '+stage;
          resultDiv.appendChild(lbl);lastStage=stage;
        }
        stageRows.forEach((r,i)=>{
          const idx=fieldRows.indexOf(r)+1;
          renderLSFieldCard(r,idx,obs);
        });
      });
    }
  }

  // Progress bar (maintenance mode)
  if(mode==='maint'&&fieldRows.length){
    progressBar.classList.remove('hidden');
    updateProgress(0,fieldRows.length);
  }

  // Rovo context (always at bottom)
  const rovoCtx=buildRovoContext(obs,data,machine);
  const rovoWrap=el('div','rovo-box');rovoWrap.style.marginTop='16px';
  rovoWrap.innerHTML=`<div class="rovo-title">🤖 Rovo AI context — copy before opening Rovo</div>`;
  const rovoText=el('div','rovo-text');rovoText.textContent=rovoCtx;
  const copyBtn=el('button','copy-btn');copyBtn.textContent='Copy for Rovo';
  copyBtn.onclick=function(){navigator.clipboard.writeText(rovoCtx);this.textContent='✓ Copied';this.classList.add('copied');setTimeout(()=>{this.textContent='Copy for Rovo';this.classList.remove('copied');},2000);};
  rovoWrap.appendChild(rovoText);rovoWrap.appendChild(copyBtn);
  resultDiv.appendChild(rovoWrap);
}

function updateProgress(done,total){
  const pct=total?Math.round(100*done/total):0;
  progressFill.style.width=pct+'%';
}

// MAINTENANCE: field step card
function renderFieldCard(r,idx,obs,fieldRows,remoteUniq,total,container){
  const id='fc-'+idx;
  const card=el('div','dc field open');card.id=id;
  const hdr=el('div','dc-hdr');
  hdr.onclick=()=>card.classList.toggle('open');
  const num=el('div','dc-num');num.textContent=idx;
  const hdrBody=el('div','dc-hdr-body');
  const roleEl=el('div','dc-role');roleEl.textContent='Maintenance — on-site';
  const title=el('div','dc-title');title.textContent=r['Sub-Issue (Observable / Physical)']||'';
  hdrBody.appendChild(roleEl);hdrBody.appendChild(title);
  const cat=el('span','dc-cat');cat.textContent=r.Category||'';
  const status=el('span','dc-status');status.textContent='○';
  const chev=el('span','dc-chevron');chev.textContent='▾';
  hdr.appendChild(num);hdr.appendChild(hdrBody);hdr.appendChild(cat);hdr.appendChild(status);hdr.appendChild(chev);
  card.appendChild(hdr);

  const body=el('div','dc-body');
  if(r['Actions for field']&&r['Actions for field']!=='MISSING'){
    const act=el('div','dc-action');act.textContent=r['Actions for field'];body.appendChild(act);
  }
  if(r['Data-backed note']&&r['Data-backed note']!=='MISSING'){
    const note=el('div','dc-note');note.textContent='📊 '+r['Data-backed note'].split('.')[0]+'.';body.appendChild(note);
  }
  if(r['Spare Parts Required']&&r['Spare Parts Required']!=='MISSING'){
    const p=el('div','dc-parts');p.textContent='🔩 '+r['Spare Parts Required'];body.appendChild(p);
  }
  const sopUrl=r['Clear SOP and link']||'';
  if(sopUrl&&sopUrl.startsWith('http')){
    const links=el('div','dc-links');
    const a=el('a','dc-link green');a.href=sopUrl;a.target='_blank';a.textContent='↗ SOP 📋';
    links.appendChild(a);body.appendChild(links);
  }

  // Find if this field step has a corresponding remote check the LS should do alongside
  const matching=remoteUniq.filter(rr=>rr['Sub-Issue (Observable / Physical)']===r['Sub-Issue (Observable / Physical)']||rr.Category===r.Category);
  if(matching.length){
    const lsBtn=el('button','ls-esc-btn');
    lsBtn.textContent='🛰 Escalate to Live Support for this step';
    const lsPanel=el('div','ls-esc-panel');
    lsPanel.innerHTML=`<div class="ls-esc-panel-title">Live Support — remote action needed</div>`;
    matching.forEach(rr=>{
      if(rr['Actions for support']&&!['MISSING','/',''].includes(rr['Actions for support'])){
        const act=el('div','ls-esc-action');act.textContent=rr['Actions for support'];lsPanel.appendChild(act);
      }
      const supSop=rr['Clear SOP and link (support)']||rr['Clear SOP and link__1']||'';
      if(supSop&&supSop.startsWith('http')){
        const a=el('a','dc-link');a.href=supSop;a.target='_blank';a.textContent='↗ BO procedure';
        lsPanel.appendChild(a);
      }
    });
    lsBtn.onclick=()=>lsPanel.classList.toggle('open');
    body.appendChild(lsBtn);body.appendChild(lsPanel);
  }

  // Done button
  const btns=el('div','dc-btns');
  const bOk=el('button','dc-btn dc-btn-ok');bOk.textContent='✓ Done — next step';
  bOk.onclick=()=>{
    card.className='dc done-ok';card.classList.remove('open');
    card.querySelector('.dc-status').textContent='✓';
    stepResults[idx]=true;
    updateProgress(Object.keys(stepResults).length,total);
    // Auto-open next card
    const next=document.getElementById('fc-'+(idx+1));
    if(next)next.classList.add('open');
  };
  const bSkip=el('button','dc-btn dc-btn-skip');bSkip.textContent='Skip';
  bSkip.onclick=()=>{
    card.className='dc done-skip';card.classList.remove('open');
    card.querySelector('.dc-status').textContent='→';
    const next=document.getElementById('fc-'+(idx+1));
    if(next)next.classList.add('open');
  };
  btns.appendChild(bOk);btns.appendChild(bSkip);body.appendChild(btns);
  card.appendChild(body);(container||resultDiv).appendChild(card);
}

function buildRovoContext(obs,data,machine){
  const parts=[...new Set(data.filter(r=>r['Spare Parts Required']&&r['Spare Parts Required']!=='MISSING').map(r=>r['Spare Parts Required']))];
  const subs=[...new Set(data.map(r=>r['Sub-Issue (Observable / Physical)']).filter(Boolean))];
  return `Machine: ${machine||'Unknown'}\nSymptom: ${obs}\nSub-issues: ${subs.slice(0,4).join(', ')}\nParts potentially needed: ${parts.join(', ')||'None identified'}\nContext: ${obs} on ${machine}. Follow ExpertOps decision tree sequence.`;
}
